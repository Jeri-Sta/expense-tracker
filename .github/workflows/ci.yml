name: CI - Version & Security Check, Build, Lint & Test

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  validate-versions:
    name: 🔍 Validate Version Synchronization
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate version synchronization
        run: |
          echo "🔍 Validating version synchronization across all files..."
          
          # Extrair versões dos package.json
          API_VERSION=$(node -p "require('./api/package.json').version")
          WEB_VERSION=$(node -p "require('./web-app/package.json').version")
          
          echo "API Version: $API_VERSION"
          echo "Web Version: $WEB_VERSION"
          
          # Extrair versões dos environment files
          ENV_VERSION=$(grep -o "version: '[^']*'" web-app/src/environments/environment.ts | cut -d"'" -f2)
          ENV_PROD_VERSION=$(grep -o "version: '[^']*'" web-app/src/environments/environment.production.ts | cut -d"'" -f2)
          
          echo "Environment Dev Version: $ENV_VERSION"
          echo "Environment Prod Version: $ENV_PROD_VERSION"
          
          # Validar se todas as versões são iguais
          if [ "$API_VERSION" != "$WEB_VERSION" ] || [ "$API_VERSION" != "$ENV_VERSION" ] || [ "$API_VERSION" != "$ENV_PROD_VERSION" ]; then
            echo "❌ Versões desincronizadas detectadas!"
            echo "API: $API_VERSION"
            echo "Web: $WEB_VERSION" 
            echo "Env Dev: $ENV_VERSION"
            echo "Env Prod: $ENV_PROD_VERSION"
            exit 1
          fi
          
          echo "✅ Todas as versões estão sincronizadas: $API_VERSION"

      - name: Validate CHANGELOG structure
        run: |
          echo "📋 Validating CHANGELOG.md structure..."
          
          if [ ! -f "CHANGELOG.md" ]; then
            echo "❌ CHANGELOG.md não encontrado"
            exit 1
          fi
          
          # Verificar se contém seção "Em Desenvolvimento"
          if ! grep -q "## \[Em Desenvolvimento\]" CHANGELOG.md; then
            echo "❌ Seção '## [Em Desenvolvimento]' não encontrada no CHANGELOG.md"
            exit 1
          fi
          
          # Verificar se contém as seções obrigatórias
          for section in "### ✨ Novas Funcionalidades" "### 🔧 Melhorias" "### 🐛 Correções"; do
            if ! grep -q "$section" CHANGELOG.md; then
              echo "❌ Seção obrigatória não encontrada: $section"
              exit 1
            fi
          done
          
          echo "✅ Estrutura do CHANGELOG.md validada com sucesso"

  validate-tag-version:
    name: 🏷️ Validate Tag Version (Tags only)
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate tag version
        run: |
          echo "🏷️ Validating tag version matches package.json versions..."
          
          # Extrair versão da tag
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          echo "Tag Version: $TAG_VERSION"
          
          # Extrair versão dos package.json
          API_VERSION=$(node -p "require('./api/package.json').version")
          WEB_VERSION=$(node -p "require('./web-app/package.json').version")
          
          echo "API Version: $API_VERSION"
          echo "Web Version: $WEB_VERSION"
          
          # Validar se a tag corresponde às versões dos packages
          if [ "$TAG_VERSION" != "$API_VERSION" ] || [ "$TAG_VERSION" != "$WEB_VERSION" ]; then
            echo "❌ Tag não corresponde às versões dos packages!"
            echo "Tag: $TAG_VERSION"
            echo "API: $API_VERSION"
            echo "Web: $WEB_VERSION"
            exit 1
          fi
          
          echo "✅ Tag corresponde às versões"

